<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mars Rover Control</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<h1>MARS ROVER CONTROL</h1>

<div class="main-layout">

    <div class="sidebar">

        <div class="panel">
            <h2>Créer un Rover</h2>
            <label>X</label>
            <input type="number" id="x" value="0">
            <label>Y</label>
            <input type="number" id="y" value="0">
            <label>Direction</label>
            <select id="direction">
                <option>N</option>
                <option>S</option>
                <option>E</option>
                <option>W</option>
            </select>
            <button onclick="createRover()">Déployer</button>
        </div>

        <div class="panel">
            <h2>Déplacer Rover</h2>
            <label>ID Rover</label>
            <input type="number" id="roverId">
            <label>Commandes</label>
            <div class="cmd-hint">F = Avancer &nbsp; B = Reculer<br>L = Gauche &nbsp; R = Droite</div>
            <input type="text" id="commands" placeholder="ex: FFRFF">
            <div class="speed-row">
                <label>Vitesse anim.</label>
                <input type="range" id="speed" min="50" max="600" value="200" step="50">
                <span id="speedLabel">200ms</span>
            </div>
            <button onclick="moveRover()" id="moveBtn">Envoyer</button>
        </div>

        <div class="panel legend-panel">
            <h2>Légende</h2>
            <div id="legend"></div>
        </div>

        <div class="panel">
            <h2>Résultat API</h2>
            <pre id="result"></pre>
        </div>

    </div>

    <div class="canvas-area">
        <div class="canvas-wrapper">
            <canvas id="roverCanvas"></canvas>
            <div class="coords-display">
                Rover sélectionné : <span id="coordsInfo">—</span>
            </div>
        </div>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
